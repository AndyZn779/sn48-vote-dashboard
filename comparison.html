,minmax(130px,1fr));gap:8px;margin-bottom:10px}.ft{text-align:center;color:#445;font-size:11px;padding:16px;margin-top:12px}.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin:0 2px}.badge.up{background:rgba(56,239,125,.15);color:#38ef7d}.badge.down{background:rgba(238,90,111,.15);color:#ee5a6f}.yc{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;margin-right:4px}.y24{background:rgba(79,172,254,.15);color:#4facfe}.y25{background:rgba(242,153,74,.15);color:#f2994a}.y26{background:rgba(240,147,251,.15);color:#f093fb}.lo{text-align:center;padding:24px;color:#8899bb;font-size:14px}@media(max-width:640px){.g{grid-template-columns:1fr}h1{font-size:20px}}</style></head><body><div class="hdr"><h1>SNH48 Group 三年总选对比 · 2024→2025→2026</h1><p>● 实时数据 · 跨年度趋势分析</p></div><div class="c" id="app"><div class="lo" id="loading">⏳ 加载历史数据...</div></div><div class="ft">数据来源: xox48.top | 2026年数据仍在持续更新中</div><script>(async function(){var el=document.getElementById("loading");

label:{show:true,position:"top",fontSize:10,fontWeight:"bold",color:"#fff",formatter:function(p){return p.data.name+"\n"+(p.value/10000).toFixed(1)+"万"}}}]});
function calcGini(arr){var v=arr.slice().sort(function(a,b){return a-b});var n=v.length,s=v.reduce(function(x,y){return x+y},0),si=0;for(var i=0;i<n;i++)si+=(i+1)*v[i];return n>0&&s>0?((2*si-(n+1)*s)/(n*s)).toFixed(4):0}

var c4=ec.init(document.getElementById("c4"));

grid:{left:10,right:20,top:20,bottom:40,containLabel:true},

grid:{left:10,right:30,top:20,bottom:40,containLabel:true},

yAxis:{type:"value",axisLabel:{fontSize:10,color:"#8899bb",formatter:function(v){return v>=10000?(v/10000).toFixed(0)+"万":v}}},
var cuts=["cutoff7","cutoff16","cutoff32","cutoff48"];

var top10Years={};years.forEach(function(y){top10Years[y]=allData[y].slice(0,10)});

grid:{left:10,right:20,top:20,bottom:40,containLabel:true},

var c8=ec.init(document.getElementById("c8"));
