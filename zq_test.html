<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ECharts 测试</title><script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script><style>body{background:#0a0e1a;color:#fff;font-family:sans-serif;padding:20px}</style></head><body><h3>测试1: 检查 ECharts 是否加载成功</h3><div id="test1" style="width:400px;height:200px;background:#1a1f33;border-radius:8px"></div><h3>测试2: 看看 zq_3year 的 chart1 代码能否运行</h3><div id="test2" style="width:400px;height:200px;background:#1a1f33;border-radius:8px"></div><div id="result"></div><script>var r=document.getElementById("result");r.innerHTML="ECharts类型: "+typeof echarts+"<br>";if(typeof echarts==="undefined"){  r.innerHTML+="<b style=color:red>ECharts 未加载!</b>";}else{  r.innerHTML+="<b style=color:green>ECharts 已加载! (版本:"+echarts.version+")</b><br>";  try{    var c1=echarts.init(document.getElementById("test1"));    c1.setOption({xAxis:{type:"category",data:["A","B","C"]},yAxis:{type:"value"},series:[{type:"bar",data:[10,20,30]}]});    r.innerHTML+="测试1: 图表1创建成功!<br>";  }catch(e){r.innerHTML+="测试1失败: "+e.message+"<br>"}  try{    var E={2024:{rank:61},2025:{rank:45},2026:{rank:35}};    var yc={2024:"#4facfe",2025:"#f2994a",2026:"#f093fb"};    var c2=echarts.init(document.getElementById("test2"));    c2.setOption({xAxis:{type:"category",data:["2024","2025","2026"],axisLabel:{color:"#c0c8e0"}},yAxis:{type:"value",inverse:true,min:30,max:65,axisLabel:{color:"#8899bb"}},series:[{type:"line",data:["2024","2025","2026"].map(function(y){return{value:E[y].rank,itemStyle:{color:yc[y]},symbol:"circle",symbolSize:12}}),lineStyle:{color:"#667eea",width:2}}],grid:{left:10,right:10,top:20,bottom:20}});    r.innerHTML+="测试2: 图表2创建成功!<br>";  }catch(e){r.innerHTML+="测试2失败: "+e.message+"<br>"}}</script></body></html>
